# L-System configuration

title    = "Square Spiral"  # window title
axiom    = "F+F+F+F"        # starting string
angle    = 90               # turn angle in degrees
distance = 5                # step length in pixels
max_iter = 4                # maximum iteration reachable with →
start_x  = -200
start_y  = -200
start_heading = 0

[rules]
F = "F+F-F-FF+F+F-F"   # rewriting rules: symbol = replacement
