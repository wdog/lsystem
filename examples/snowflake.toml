# L-System configuration

title    = "Koch Snowflake"  # window title
axiom    = "F++F++F"         # starting string
angle    = 60                # turn angle in degrees
distance = 4                 # step length in pixels
max_iter = 5                 # maximum iteration reachable with →
start_x  = -250
start_y  = -150
start_heading = 0

[rules]
F = "F-F++F-F"   # rewriting rules: symbol = replacement
