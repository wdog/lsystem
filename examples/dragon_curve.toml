# L-System configuration

title    = "Dragon Curve"  # window title
axiom    = "FX"            # starting string
angle    = 90              # turn angle in degrees
distance = 8               # step length in pixels
max_iter = 16             # maximum iteration reachable with →
start_x  = 200
start_y  = 0
start_heading = 0

[rules]
X = "X+YF+"   # rewriting rules: symbol = replacement
Y = "-FX-Y"
