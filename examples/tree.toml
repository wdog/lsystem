# L-System configuration

title    = "Binary Tree"  # window title
axiom    = "F"            # starting string
angle    = 26             # turn angle in degrees
distance = 8              # step length in pixels
max_iter = 6              # maximum iteration reachable with →
start_x  = -50
start_y  = -300
start_heading = 90

[rules]
F = "F[+F]F[-F]F"        # rewriting rules: symbol = replacement
